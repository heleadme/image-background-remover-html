<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片去背景 - Remove.bg</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 1000px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .api-key-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .api-key-section label {
            display: block;
            color: #555;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .api-key-input {
            display: flex;
            gap: 10px;
        }
        
        .api-key-input input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .api-key-input input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .api-key-input button {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }
        
        .api-key-input button:hover {
            background: #5a6fd6;
        }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 30px;
        }
        
        .upload-area:hover {
            background: #f8f9ff;
            border-color: #764ba2;
        }
        
        .upload-area.dragover {
            background: #f0f4ff;
            border-color: #764ba2;
            transform: scale(1.02);
        }
        
        .upload-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }
        
        .upload-text {
            color: #666;
            font-size: 1.1rem;
        }
        
        .images-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 768px) {
            .images-container {
                grid-template-columns: 1fr;
            }
        }
        
        .image-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .image-box h3 {
            color: #555;
            margin-bottom: 15px;
        }
        
        .image-box img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            background: repeating-conic-gradient(#e0e0e0 0% 25%, white 0% 50%) 50% / 20px 20px;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }
        
        .success {
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .api-note {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-top: 20px;
        }
        
        .api-note a {
            color: #667eea;
            text-decoration: none;
        }
        
        .api-note a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🪄 图片去背景</h1>
        <p class="subtitle">Powered by Remove.bg API</p>
        
        <div class="api-key-section">
            <label for="apiKey">Remove.bg API Key</label>
            <div class="api-key-input">
                <input type="password" id="apiKey" placeholder="输入你的 API Key，点击保存">
                <button onclick="saveApiKey()">保存</button>
            </div>
        </div>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📷</div>
            <div class="upload-text">点击或拖拽图片到这里上传</div>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>正在处理中，请稍候...</div>
        </div>
        
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
        
        <div class="images-container">
            <div class="image-box">
                <h3>原图</h3>
                <img id="originalImage" src="" alt="原图" style="display: none;">
            </div>
            <div class="image-box">
                <h3>去背景后</h3>
                <img id="processedImage" src="" alt="去背景后" style="display: none;">
            </div>
        </div>
        
        <div class="button-group">
            <button class="btn-primary" id="processBtn" disabled>去除背景</button>
            <button class="btn-secondary" id="downloadBtn" disabled>下载图片</button>
            <button class="btn-secondary" id="resetBtn">重新上传</button>
        </div>
        
        <p class="api-note">
            没有 API Key？去 <a href="https://www.remove.bg/dashboard#api-key" target="_blank">Remove.bg</a> 免费获取
        </p>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const apiKeyInput = document.getElementById('apiKey');
        const originalImage = document.getElementById('originalImage');
        const processedImage = document.getElementById('processedImage');
        const processBtn = document.getElementById('processBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const success = document.getElementById('success');
        
        let currentFile = null;
        let processedBlob = null;
        let apiKey = localStorage.getItem('removebg_api_key') || '';
        
        // 加载保存的 API Key
        if (apiKey) {
            apiKeyInput.value = apiKey;
        }
        
        // 保存 API Key
        function saveApiKey() {
            apiKey = apiKeyInput.value.trim();
            if (apiKey) {
                localStorage.setItem('removebg_api_key', apiKey);
                showSuccess('API Key 已保存');
            } else {
                localStorage.removeItem('removebg_api_key');
                showError('请输入有效的 API Key');
            }
        }
        
        // 点击上传区域
        uploadArea.addEventListener('click', () => fileInput.click());
        
        // 拖拽事件
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        // 文件选择
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });
        
        // 处理文件
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showError('请上传图片文件');
                return;
            }
            
            currentFile = file;
            error.style.display = 'none';
            success.style.display = 'none';
            
            // 显示原图
            const reader = new FileReader();
            reader.onload = (e) => {
                originalImage.src = e.target.result;
                originalImage.style.display = 'block';
                processedImage.style.display = 'none';
                processBtn.disabled = !apiKey;
                downloadBtn.disabled = true;
            };
            reader.readAsDataURL(file);
        }
        
        // 处理按钮
        processBtn.addEventListener('click', async () => {
            if (!currentFile || !apiKey) return;
            
            const formData = new FormData();
            formData.append('image_file', currentFile);
            formData.append('size', 'full');
            
            loading.style.display = 'block';
            processBtn.disabled = true;
            error.style.display = 'none';
            success.style.display = 'none';
            
            try {
                const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                    method: 'POST',
                    headers: {
                        'X-Api-Key': apiKey
                    },
                    body: formData
                });
                
                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.errors?.[0]?.title || '处理失败，请检查 API Key');
                }
                
                processedBlob = await response.blob();
                const url = URL.createObjectURL(processedBlob);
                
                processedImage.src = url;
                processedImage.style.display = 'block';
                downloadBtn.disabled = false;
                showSuccess('处理成功！');
            } catch (err) {
                showError(err.message);
            } finally {
                loading.style.display = 'none';
                processBtn.disabled = false;
            }
        });
        
        // 下载按钮
        downloadBtn.addEventListener('click', () => {
            if (!processedBlob) return;
            
            const url = URL.createObjectURL(processedBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'no-bg.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
        
        // 重置按钮
        resetBtn.addEventListener('click', () => {
            currentFile = null;
            processedBlob = null;
            originalImage.src = '';
            originalImage.style.display = 'none';
            processedImage.src = '';
            processedImage.style.display = 'none';
            processBtn.disabled = true;
            downloadBtn.disabled = true;
            error.style.display = 'none';
            success.style.display = 'none';
            fileInput.value = '';
        });
        
        // 显示错误
        function showError(message) {
            error.textContent = message;
            error.style.display = 'block';
        }
        
        // 显示成功
        function showSuccess(message) {
            success.textContent = message;
            success.style.display = 'block';
        }
        
        // API Key 输入时更新状态
        apiKeyInput.addEventListener('input', () => {
            apiKey = apiKeyInput.value.trim();
            processBtn.disabled = !apiKey || !currentFile;
        });
    </script>
</body>
</html>
